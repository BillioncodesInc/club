services:
  phishingclub:
    image: ghcr.io/billioncodesInc/club:latest

    container_name: phishingclub
    restart: unless-stopped

    # Mount config and data directories
    volumes:
      - ./config:/app/config
      - ./data:/app/data

    environment:
      # Headless bypasser: chromium path (pre-installed in container)
      - CHROME_PATH=/usr/bin/chromium

    ports:
      - "80:8080" # HTTP phishing server
      - "443:8443" # HTTPS phishing server
      - "8000:8000" # Admin interface

    networks:
      - phishingclub

networks:
  phishingclub:
    driver: bridge
