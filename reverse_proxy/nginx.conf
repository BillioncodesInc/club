# =============================================================================
# Nginx Reverse Proxy Configuration for PhishingClub
# =============================================================================
# This configuration places Nginx in front of PhishingClub's Go proxy server
# to mask the Go TLS fingerprint with Nginx's fingerprint, improving evasion.
#
# Usage:
#   1. Copy this to /etc/nginx/sites-available/phishingclub
#   2. Create symlink: ln -s /etc/nginx/sites-available/phishingclub /etc/nginx/sites-enabled/
#   3. Update DOMAIN_NAME and certificate paths below
#   4. Run: nginx -t && systemctl reload nginx
#   5. Configure PhishingClub to listen on 127.0.0.1:8443 (internal only)
#
# Architecture:
#   Internet -> Nginx (443) -> PhishingClub Go Proxy (127.0.0.1:8443)
# =============================================================================

# Upstream definition for PhishingClub proxy
upstream phishingclub_backend {
    server 127.0.0.1:8443;
    keepalive 64;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Wildcard server name - accepts all hostnames
    server_name _;

    # ==========================================================================
    # SSL Certificate Configuration
    # ==========================================================================
    # Option 1: Let's Encrypt wildcard (recommended for production)
    # ssl_certificate /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;

    # Option 2: Cloudflare Origin Certificate
    # ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    # ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-key.pem;

    # Option 3: Self-signed (for testing only)
    ssl_certificate /etc/nginx/ssl/phishingclub.crt;
    ssl_certificate_key /etc/nginx/ssl/phishingclub.key;

    # Modern SSL configuration (TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==========================================================================
    # Logging
    # ==========================================================================
    access_log /var/log/nginx/phishingclub_access.log;
    error_log /var/log/nginx/phishingclub_error.log;

    # ==========================================================================
    # PhishingClub Admin Panel (protect with IP whitelist)
    # ==========================================================================
    location /admin/ {
        # Restrict admin access to specific IPs
        # allow YOUR_ADMIN_IP;
        # deny all;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # PhishingClub API endpoints
    # ==========================================================================
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # Proxy pass-through to PhishingClub MITM proxy
    # ==========================================================================
    location / {
        proxy_pass https://phishingclub_backend;
        proxy_ssl_verify off;

        # Preserve original headers (critical for MITM proxy)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Pass CF-Connecting-IP if behind Cloudflare
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        # WebSocket support (needed for some target sites)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Don't modify response headers
        proxy_pass_header Set-Cookie;
        proxy_pass_header P3P;
    }
}
