<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Summary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.4;
      color: #333;
      max-width: 500px;
      margin: 0 auto;
      padding: 10px;
    }
    .header {
      margin-bottom: 15px;
    }
    .summary-box {
      padding: 10px;
      margin-bottom: 15px;
    }
    .view-button {
      display: block;
      background-color: #0066cc;
      color: white;
      text-align: center;
      padding: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .footer {
      font-size: 11px;
      color: #777;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Check Summary</h3>
  </div>
  
  <div class="summary-box">
    <p>Dear Account Holder,</p>
    <p>Your check summary is ready. Please review your recent transactions and account balance.</p>
    <p>For security, please access the complete details through the secure link below.</p>
  </div>
  
  <a href="{{.URL}}" class="view-button">View Summary</a>
  
  <div class="footer">
    <p>Automated message - Do not reply</p>
  </div>
</body>
</html>
