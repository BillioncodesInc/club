      find: "login"
      from: "request_body"

    - name: "msa_auth_cookie"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "__Host-MSAAUTH"
      from: "cookie"
      required: false

    - name: "msa_persistent_cookie"
